name: build

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '20 5 * * 1'
  workflow_dispatch:

jobs:
  test:

    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        ruby-version:
          - "3"
          - "3.4"
          - "3.3"
          - "3.2"
          - "3.1"
          - "3.0"
          - "2.7"
          - "2.6"
          - "2.5"
          - "truffleruby"
        rack-version:
          - "" # default Rack version

        exclude:
          # RubyGems on Ruby 2.5 ignores rack's required_ruby_version and
          # installs a Rack that no longer runs on 2.5 — test it with a
          # compatible Rack pinned below instead
          - ruby-version: "2.5"
            rack-version: ""

        include:
          - ruby-version: "2.5"
            rack-version: "~>2.2"

          - ruby-version: "2.7"
            rack-version: "~>1.2.0"
          - ruby-version: "2.7"
            rack-version: "~>1.2"
          - ruby-version: "2.7"
            rack-version: "~>2.0.0"
          - ruby-version: "2.7"
            rack-version: "~>2.0"
          - ruby-version: "2.7"
            rack-version: "~>3.0"
          - ruby-version: "2.7"
            rack-version: "~>3.0.0"

          - ruby-version: "3.2"
            rack-version: "~>1.2.0"
          - ruby-version: "3.2"
            rack-version: "~>1.2"
          - ruby-version: "3.2"
            rack-version: "~>2.0.0"
          - ruby-version: "3.2"
            rack-version: "~>2.0"
          - ruby-version: "3.2"
            rack-version: "~>3.0"
          - ruby-version: "3.2"
            rack-version: "~>3.0.0"

    steps:
      - uses: actions/checkout@v7

      - name: Set up Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Specify "rack" gem version ${{ matrix.rack-version }}
        if: ${{ matrix.rack-version }}
        run: bundle add rack --version="${{ matrix.rack-version }}"

      - name: Run tests
        run: bundle exec rspec --format documentation
